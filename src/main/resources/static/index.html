<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간단한 Spring API 게시판</title>
    <style>
        /* [UI 디자인] 전체적인 레이아웃 및 폰트 설정 */
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        h1 { text-align: center; }

        /* [UI 디자인] 게시글 작성 영역(Form) 스타일 */
        .form-section { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; background-color: #f9f9f9; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; } /* 세로 크기 조절 허용 */
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; } /* 마우스 호버 시 색상 변경 */

        /* [UI 디자인] 게시글 목록 리스트 스타일 */
        .list-section { border-top: 2px solid #333; padding-top: 20px; }
        #post-list { list-style: none; padding: 0; }
        .post-item { border-bottom: 1px solid #eee; padding: 15px 0; cursor: pointer; }
        .post-item:hover { background-color: #f1f1f1; }
        .post-title { font-size: 1.2em; font-weight: bold; color: #333; }
        .post-meta { font-size: 0.9em; color: #666; margin-top: 5px; }

        /* [UI 디자인] 상세 보기 팝업(Modal) 스타일 */
        .modal { display: none; /* 기본적으로는 숨김 처리 */ position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%; max-width: 600px; border-radius: 8px; position: relative;}
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; position: absolute; top: 10px; right: 15px;}
        .close:hover { color: black; }
        #modal-title { margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;}
        #modal-content { white-space: pre-wrap; line-height: 1.6; } /* 줄바꿈 문자(\n)를 화면에 반영 */
    </style>
</head>
<body>

<h1>미니 게시판</h1>

<div class="form-section">
    <h3>새 글 작성</h3>
    <div class="form-group">
        <label for="title">제목</label>
        <input type="text" id="title" placeholder="제목을 입력하세요">
    </div>
    <div class="form-group">
        <label for="content">내용</label>
        <textarea id="content" placeholder="내용을 입력하세요"></textarea>
    </div>
    <button onclick="createPost()">글 등록</button>
</div>

<div class="list-section">
    <h3>게시글 목록</h3>
    <ul id="post-list">
        <p>로딩 중...</p>
    </ul>
</div>

<div id="postModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modal-title"></h2>
        <p class="post-meta">ID: <span id="modal-id"></span></p>
        <div id="modal-content"></div>
    </div>
</div>

<script>
    /**
     * [설정] 백엔드 API 서버의 베이스 URL
     * Spring Boot 서버가 가동 중인 주소와 맞아야 합니다.
     */
    const API_BASE_URL = 'http://localhost:8080/api/articles';

    /**
     * [이벤트] 페이지가 처음 로드될 때 실행
     */
    window.onload = function() {
        fetchPosts(); // 서버에서 글 목록을 가져옴
    };

    /**
     * [기능] 전체 게시글 목록 조회 (GET 요청)
     */
    function fetchPosts() {
        const listElement = document.getElementById('post-list');

        fetch(API_BASE_URL)
            .then(response => {
                // 응답 상태가 200번대가 아닐 경우 에러 던짐
                if (!response.ok) throw new Error('네트워크 응답 불량');
                return response.json(); // 응답 본문을 JSON 객체로 변환
            })
            .then(posts => {
                listElement.innerHTML = ''; // 기존 '로딩 중...' 또는 이전 데이터 삭제

                if (posts.length === 0) {
                    listElement.innerHTML = '<p>게시글이 없습니다.</p>';
                    return;
                }

                // 서버에서 받은 데이터 배열을 순회하며 HTML 생성
                posts.forEach(post => {
                    const li = document.createElement('li');
                    li.className = 'post-item';
                    li.onclick = () => fetchPostDetail(post.id); // 항목 클릭 시 상세 정보 함수 호출

                    li.innerHTML = `
                        <div class="post-title">${post.title}</div>
                        <div class="post-meta">ID: ${post.id}</div>
                    `;
                    listElement.appendChild(li);
                });
            })
            .catch(error => {
                console.error('Fetch error:', error);
                listElement.innerHTML = '<p style="color:red;">목록을 불러오지 못했습니다. API 서버를 확인하세요.</p>';
            });
    }

    /**
     * [기능] 특정 게시글 상세 조회 및 모달 표시 (GET 요청)
     * @param {number} postId - 조회할 게시글의 고유 번호
     */
    function fetchPostDetail(postId) {
        fetch(`${API_BASE_URL}/${postId}`)
            .then(response => response.json())
            .then(post => {
                // 모달 내부 요소에 데이터 채우기
                document.getElementById('modal-title').innerText = post.title;
                document.getElementById('modal-id').innerText = post.id;
                document.getElementById('modal-content').innerText = post.content;
                
                // 모달 화면에 표시
                document.getElementById('postModal').style.display = 'block';
            })
            .catch(error => alert('상세 내용을 불러오지 못했습니다.'));
    }

    /**
     * [기능] 새 게시글 서버에 저장 (POST 요청)
     */
    function createPost() {
        const titleInput = document.getElementById('title');
        const contentInput = document.getElementById('content');

        // 서버로 보낼 데이터 객체 생성
        const postData = {
            title: titleInput.value,
            content: contentInput.value
        };

        // 간단한 유효성 검사
        if (!postData.title || !postData.content) {
            alert('제목과 내용을 모두 입력해주세요.');
            return;
        }

        fetch(API_BASE_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json' // 전송 데이터가 JSON임을 서버에 알림
            },
            body: JSON.stringify(postData) // JS 객체를 JSON 문자열로 직렬화하여 본문에 담음
        })
        .then(response => {
            if (response.ok) {
                alert('글이 등록되었습니다.');
                titleInput.value = ''; // 입력창 초기화
                contentInput.value = '';
                fetchPosts(); // 목록에 즉시 반영하기 위해 다시 호출
            } else {
                alert('글 등록에 실패했습니다.');
            }
        })
        .catch(error => console.error('Error:', error));
    }

    /**
     * [기능] 모달 닫기
     */
    function closeModal() {
        document.getElementById('postModal').style.display = 'none';
    }

    /**
     * [이벤트] 사용자가 모달 외부(검은 배경)를 클릭했을 때 닫기 처리
     */
    window.onclick = function(event) {
        const modal = document.getElementById('postModal');
        if (event.target == modal) {
            modal.style.display = 'none';
        }
    }
</script>
</body>
</html>
